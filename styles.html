.jadwal-editing{
  background:#fff7ed !important;
}

.jadwal-conflict{
  background:#fee2e2 !important;
  animation:shake .3s ease;
}

@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-4px)}
  50%{transform:translateX(4px)}
  75%{transform:translateX(-4px)}
  100%{transform:translateX(0)}
}

.btn-saving{

}

.row-deleting{
  opacity:0;
  height:0;
  transform:translateY(-10px);
}

/* =====================================================
   TOAST NOTIFICATION SYSTEM
   ===================================================== */
#toastContainer{
  position:fixed;
  bottom:24px;
  right:24px;
  z-index:999998;
  display:flex;
  flex-direction:column-reverse;
  gap:10px;
  pointer-events:none;
  max-width:340px;
}

  #toastContainer{
    bottom:72px;
    left:12px;
    right:12px;
    max-width:none;
  }

.toast{
  background:#1f2937;
  color:#fff;
  padding:12px 16px;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,.32);
  opacity:0;
  transform:translateY(14px);
  transition:opacity .3s ease,transform .3s ease;
  pointer-events:auto;
  line-height:1.5;
  display:flex;align-items:center;gap:8px;
}

  margin-left:auto;

  opacity:.7;
  font-size:16px;
  line-height:1;
  flex-shrink:0;
}

  /* ===================================================================
     SIDEBAR LAYOUT (v3) — Collapsible, Submenu, Tooltip, SaaS-style
     =================================================================== */

  /* Reset body padding */
  body { padding:0 !important; }

  /* Hide OLD header + horizontal menu */
  .header-wrapper,
  .divider   { display:none !important; }
  #mainMenu  { display:none !important; }

  /* =========================================================
     SIDEBAR ROOT
     ========================================================= */
  #appSidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 230px;
    background: linear-gradient(180deg,#1e1b4b 0%,#4338ca 55%,#6C63FF 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    z-index: 200;
    overflow: visible;        /* needed for flyout tooltips */
    transition: width .25s cubic-bezier(.4,0,.2,1);
    box-shadow: 4px 0 24px rgba(0,0,0,.22);
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,.18) transparent;
  }
  /* Internal scroll container (so footer always visible) */
  #sbNav {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 8px 8px 4px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,.15) transparent;
  }

  /* Collapsed state */
  #appSidebar.sb-collapsed {
    width: 64px;
  }

  /* Main content area */
  #sbMain {
    margin-left: 230px;
    min-height: 100vh;
    transition: margin-left .25s cubic-bezier(.4,0,.2,1);
    background: linear-gradient(180deg,#f5f6fb,#eef1ff);
  }
  #appSidebar.sb-collapsed ~ #sbMain,
  body.sb-collapsed #sbMain {
    margin-left: 64px;
  }

  /* =========================================================
     BRAND SECTION
     ========================================================= */
  #sbBrand {
    padding: 14px 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,.15);
    flex-shrink: 0;
    min-height: 64px;
  }
  #sbLogoCont {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: rgba(255,255,255,.18);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
    transition: width .25s, height .25s;
  }
  #sbLogo { width:100%; height:100%; object-fit:contain; display:none; }
  #sbLogoIcon { font-size:18px; line-height:1; }
  #sbAppTitle {
    font-size: 12px; font-weight: 800;
    line-height: 1.4; color: #fff;
    letter-spacing: .2px;
    white-space: nowrap;
    overflow: hidden;
    transition: opacity .2s, width .25s;
  }
  #sbCollapseBtn {
    background: rgba(255,255,255,.12) !important;
    border: none !important;
    border-radius: 8px !important;
    width: 28px !important; height: 28px !important;
    min-width: 28px !important;
    padding: 0 !important;
    cursor: pointer !important;
    color: rgba(255,255,255,.8) !important;
    font-size: 11px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    box-shadow: none !important;
    transition: background .18s !important;
    flex-shrink: 0 !important;
    margin: 0 !important;
  }
  #sbCollapseBtn:hover { background: rgba(255,255,255,.25) !important; }

  /* =========================================================
     GREETING STRIP
     ========================================================= */
  #sbGreeting {
    padding: 10px 14px 8px;
    border-bottom: 1px solid rgba(255,255,255,.10);
    flex-shrink: 0;
    overflow: hidden;
    white-space: nowrap;
  }
  .sb-greeting-name {
    font-size: 13px; font-weight: 700; color: #fff;
    overflow: hidden; text-overflow: ellipsis;
  }
  .sb-greeting-date {
    font-size: 10.5px; color: rgba(255,255,255,.6); margin-top: 2px;
  }

  /* =========================================================
     GENERIC ITEM + GROUP
     ========================================================= */

  /* All clickable rows in nav share base style */
  .sb-item,
  .sb-group-hd {
    display: flex !important;
    align-items: center !important;
    width: 100% !important;
    text-align: left !important;
    background: transparent !important;
    border: none !important;
    color: rgba(255,255,255,.82) !important;
    padding: 9px 10px !important;
    border-radius: 10px !important;
    font-size: 13.5px !important;
    font-weight: 600 !important;
    cursor: pointer !important;
    box-shadow: none !important;
    transition: background .15s, color .15s !important;
    gap: 10px !important;
    margin: 0 !important;
    flex-shrink: 0 !important;
    position: relative;
    white-space: nowrap;
    overflow: hidden;
  }
  .sb-item:hover,
  .sb-group-hd:hover {
    background: rgba(255,255,255,.16) !important;
    color: #fff !important;
    transform: none !important;
  }
  .sb-item.sb-active {
    background: rgba(255,255,255,.26) !important;
    color: #fff !important;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.2), 0 2px 8px rgba(0,0,0,.2) !important;
  }
  /* Keyboard navigation focus ring */
  .sb-item:focus-visible,
  .sb-group-hd:focus-visible {
    outline: 2px solid rgba(255,255,255,.75) !important;
    outline-offset: -2px !important;
    background: rgba(255,255,255,.18) !important;
    color: #fff !important;
  }

  /* Icon span */
  .sb-icon {
    font-size: 16px;
    flex-shrink: 0;
    width: 22px;
    text-align: center;
    line-height: 1;
  }

  /* Label (hidden when collapsed) */
  .sb-label {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity .2s, max-width .25s;
    max-width: 200px;
  }

  /* Child items — extra left indent */
  .sb-child {
    padding-left: 14px !important;
    font-size: 13px !important;
    font-weight: 500 !important;
  }
  .sb-child .sb-icon { font-size: 14px !important; }

  /* Group section header */
  .sb-group { margin-top: 2px; }

  /* Chevron arrow */
  .sb-arrow {
    width: 14px; height: 14px;
    flex-shrink: 0;
    margin-left: auto;
    transition: transform .22s cubic-bezier(.4,0,.2,1);
    color: rgba(255,255,255,.55);
  }
  .sb-group.sb-open > .sb-group-hd .sb-arrow {
    transform: rotate(180deg);
  }

  /* Submenu body — collapsed by default */
  .sb-group-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height .28s cubic-bezier(.4,0,.2,1), opacity .22s;
    opacity: 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding: 0 0 0 10px;
  }
  .sb-group.sb-open > .sb-group-body {
    max-height: 500px;
    opacity: 1;
  }

  /* =========================================================
     FOOTER
     ========================================================= */
  #sbFooter {
    padding: 8px 8px;
    border-top: 1px solid rgba(255,255,255,.12);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  #sbFooter button {
    display: flex !important;
    align-items: center !important;
    width: 100% !important;
    text-align: left !important;
    background: rgba(255,255,255,.08) !important;
    border: none !important;
    color: rgba(255,255,255,.78) !important;
    padding: 9px 10px !important;
    border-radius: 10px !important;
    font-size: 13px !important;
    font-weight: 600 !important;
    cursor: pointer !important;
    box-shadow: none !important;
    gap: 10px !important;
    margin: 0 !important;
    transition: background .15s !important;
    white-space: nowrap;
    overflow: hidden;
  }
  #sbFooter button:hover {
    background: rgba(255,255,255,.2) !important;
    color: #fff !important;
    transform: none !important;
  }
  #sbFooter button.sb-logout {
    background: rgba(239,68,68,.2) !important;
    color: #fca5a5 !important;
  }
  #sbFooter button.sb-logout:hover {
    background: rgba(239,68,68,.38) !important;
    color: #fff !important;
  }

  /* =========================================================
     COLLAPSE MODE — hide labels, center icons
     ========================================================= */
  #appSidebar.sb-collapsed .sb-label,
  #appSidebar.sb-collapsed .sb-arrow,
  #appSidebar.sb-collapsed #sbAppTitle,
  #appSidebar.sb-collapsed #sbGreeting {
    opacity: 0;
    max-width: 0;
    pointer-events: none;
    overflow: hidden;
  }
  #appSidebar.sb-collapsed .sb-item,
  #appSidebar.sb-collapsed .sb-group-hd,
  #appSidebar.sb-collapsed #sbFooter button {
    padding: 10px 0 !important;
    justify-content: center !important;
    gap: 0 !important;
  }
  #appSidebar.sb-collapsed .sb-icon {
    width: 40px;
    font-size: 18px;
  }
  #appSidebar.sb-collapsed .sb-child {
    padding-left: 0 !important;
  }
  /* Keep groups closed visually when collapsed */
  #appSidebar.sb-collapsed .sb-group-body {
    max-height: 0 !important;
    opacity: 0 !important;
  }
  #appSidebar.sb-collapsed #sbCollapseBtn {
    margin: 0 auto !important;
  }
  #appSidebar.sb-collapsed #sbBrand {
    justify-content: center;
    padding: 14px 0 12px;
  }
  #appSidebar.sb-collapsed #sbLogoCont {
    margin: 0 auto;
  }
  #appSidebar.sb-collapsed #sbFooter {
    padding: 8px 0;
  }
  /* Also hide expand-only elements */
  .sb-expand-only {
    transition: opacity .2s;
  }
  #appSidebar.sb-collapsed .sb-expand-only {
    opacity: 0;
    pointer-events: none;
    max-height: 0;
    overflow: hidden;
  }

  /* =========================================================
     TOOLTIPS (visible when collapsed)
     ========================================================= */
  [data-tooltip] {
    position: relative;
  }
  #appSidebar.sb-collapsed [data-tooltip]::after {
    content: attr(data-tooltip);
    position: absolute;
    left: calc(100% + 12px);
    top: 50%;
    transform: translateY(-50%);
    background: #1e1b4b;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 8px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    box-shadow: 0 4px 14px rgba(0,0,0,.3);
    transition: opacity .15s;
    z-index: 9999;
  }
  #appSidebar.sb-collapsed [data-tooltip]:hover::after {
    opacity: 1;
  }
  /* Flyout group submenu when collapsed — show on hover */
  #appSidebar.sb-collapsed .sb-group:hover > .sb-group-body {
    max-height: 500px !important;
    opacity: 1 !important;
    position: absolute;
    left: 64px;
    background: linear-gradient(135deg,#312e81,#4338ca);
    border-radius: 0 12px 12px 0;
    padding: 6px 8px;
    box-shadow: 4px 4px 20px rgba(0,0,0,.3);
    z-index: 9999;
    width: 170px;
    min-height: fit-content;

  #appSidebar.sb-collapsed .sb-group:hover > .sb-group-body .sb-child {
    padding-left: 8px !important;
    justify-content: flex-start !important;
    gap: 8px !important;
    width: 100% !important;
  }
  #appSidebar.sb-collapsed .sb-group:hover > .sb-group-body .sb-label {
    opacity: 1 !important;
    max-width: 200px !important;
    pointer-events: auto !important;
  }

     TOP PROFILE BAR

    border-bottom: 2px solid #e8eaff;
  }

     HAMBURGER + OVERLAY (mobile)

  @media(max-width:900px) {
    #sbHamburger { display: flex; }

  /* =========================================================

     ========================================================= */
  @media(min-width:768px) and (max-width:900px) {
    #sbHamburger { display: none !important; }
    #appSidebar { transform: none !important; width: 64px !important; }
    #sbMain { margin-left: 64px !important; }
    #appSidebar .sb-label,
    #appSidebar .sb-arrow,
    #appSidebar #sbAppTitle,
    #appSidebar #sbGreeting {
      opacity: 0 !important; max-width: 0 !important;
      max-height: 0 !important; overflow: hidden !important;
      pointer-events: none !important;
    }
    #appSidebar #sbCollapseBtn { display: none !important; }
    #appSidebar .sb-item,
    #appSidebar .sb-group-hd,
    #appSidebar #sbFooter button {
      padding: 10px 0 !important;
      justify-content: center !important;
      gap: 0 !important;

    #appSidebar .sb-icon { width: 44px !important; font-size: 18px !important; }
    /* Tooltips on hover */
    #appSidebar [data-tooltip] { position: relative; }
    #appSidebar [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute; left: calc(100% + 12px); top: 50%;
      transform: translateY(-50%);
      background: #1e1b4b; color: #fff;
      font-size: 12px; font-weight: 600;
      padding: 5px 10px; border-radius: 8px;
      white-space: nowrap; pointer-events: none;
      opacity: 0; box-shadow: 0 4px 14px rgba(0,0,0,.3);
      transition: opacity .15s; z-index: 9999;

    #appSidebar .sb-group-body { max-height: 0 !important; opacity: 0 !important; position: static; }
    #appSidebar .sb-group:hover > .sb-group-body {
      max-height: 500px !important; opacity: 1 !important;
      position: absolute; left: 64px;
      background: linear-gradient(135deg,#312e81,#4338ca);
      border-radius: 0 12px 12px 0; padding: 6px 8px;
      box-shadow: 4px 4px 20px rgba(0,0,0,.3);
      z-index: 9999; width: 170px;

    #appSidebar .sb-group:hover > .sb-group-body .sb-child {
      padding-left: 8px !important; justify-content: flex-start !important;
      gap: 8px !important; width: 100% !important;
