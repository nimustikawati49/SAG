function loadCentralRegistryOverview() {
  var el = document.getElementById('centralRegistryOverview');
  if (!el) return;
  el.innerHTML = '<div class="skeleton" style="height:72px;border-radius:10px;margin-bottom:8px"></div><div class="skeleton" style="height:72px;border-radius:10px"></div>';

  google.script.run
    .withSuccessHandler(function(data) {
      if (!el) return;
      var counts = (data && data.counts) || {};
      var rel = (data && data.latestRelease) || null;
      var html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px">' +
        '<div class="card stat" style="padding:12px"><div class="label">Deployments</div><div class="value">' + (counts.deployments || 0) + '</div></div>' +
        '<div class="card stat" style="padding:12px"><div class="label">Allow Update</div><div class="value">' + (counts.allow_update || 0) + '</div></div>' +
        '<div class="card stat" style="padding:12px"><div class="label">Resource Map</div><div class="value">' + (counts.resources || 0) + '</div></div>' +
        '<div class="card stat" style="padding:12px"><div class="label">App Releases</div><div class="value">' + (counts.releases || 0) + '</div></div>' +
        '<div class="card stat" style="padding:12px"><div class="label">Update Log</div><div class="value">' + (counts.updates || 0) + '</div></div>' +
        '</div>';

      html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px">';
      html += '<div style="border:1px solid #dbeafe;border-radius:12px;padding:12px;background:#f8fbff"><div style="font-size:12px;font-weight:700;color:#1d4ed8;margin-bottom:8px">APP RELEASE TERAKHIR</div>' +
        (rel
          ? '<div style="font-size:13px;line-height:1.7"><b>Versi:</b> ' + _escSA(rel.version || '-') + '<br><b>Schema:</b> ' + _escSA(rel.schema_version || '-') + '<br><b>Channel:</b> ' + _escSA(rel.channel || '-') + '<br><b>Status:</b> ' + _escSA(rel.status || '-') + '</div>'
          : '<div class="muted" style="font-size:12px">Belum ada release tercatat.</div>') +
        '</div>';

      html += '<div style="border:1px solid #e5e7eb;border-radius:12px;padding:12px;background:#fff"><div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:8px">SHEET REGISTRY AKTIF</div>' +
        '<div style="font-size:12px;line-height:1.8">' +
        '• DEPLOYMENTS<br>• RESOURCE_MAP<br>• APP_RELEASES<br>• UPDATE_LOG' +
        '</div></div>';
      html += '</div>';
      el.innerHTML = html;
    })
    .withFailureHandler(function(err) {
      el.innerHTML = '<div class="alert-banner error">❌ ' + (err.message || 'Gagal memuat registry hub') + '</div>';
    })
    .getCentralRegistryOverview();
}

function loadStorageModeConfig() {
  var el = document.getElementById('storageModeSelect');
  if (!el) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (el) el.value = (res && res.mode) || 'central';
    })
    .withFailureHandler(function() {})
    .getStorageModeConfig();
}

function saveStorageModeConfig() {
  var el = document.getElementById('storageModeSelect');
  if (!el) return;
  var mode = el.value || 'central';

  if (mode === 'per_guru') {
    var ok = confirm(
      '⚠️ PERINGATAN: Mode "per_guru" akan membuat SPREADSHEET PRIBADI BARU (kosong) ' +
      'untuk setiap guru aktif saat mereka login berikutnya, dan SEMUA data operasional ' +
      'mereka (Setting, Jurnal, Nilai, Jadwal, dst.) akan dialihkan ke spreadsheet baru itu ' +
      '— BUKAN ke data lama di spreadsheet pusat.\n\n' +
      'Data lama TIDAK hilang/terhapus, tapi guru tidak akan melihatnya lagi selama mode ini aktif ' +
      '(seolah akun mereka kosong total).\n\n' +
      'Jangan aktifkan mode ini kecuali kamu benar-benar siap memigrasikan setiap guru satu per satu. ' +
      'Lanjutkan aktifkan "per_guru"?'
    );
    if (!ok) {
      loadStorageModeConfig(); // kembalikan dropdown ke nilai tersimpan saat ini
      return;
    }
  }

  google.script.run
    .withSuccessHandler(function(res) {
      if (typeof showToast === 'function') showToast('✅ Mode storage: ' + (res.mode || mode), 'success');
      loadCentralRegistryOverview();
    })
    .withFailureHandler(function(err) {
      if (typeof showToast === 'function') showToast('❌ ' + (err.message || 'Gagal'), 'error');
    })
    .setStorageModeConfig(mode);
}

function loadResourceMapEntries() {
  var el = document.getElementById('resourceMapList');
  var info = document.getElementById('resourceMapInfo');
  if (el) el.innerHTML = '<div class="skeleton" style="height:70px;border-radius:10px;margin-bottom:6px"></div>'.repeat(2);
  if (info) info.textContent = '⏳ Memuat resource map...';

  google.script.run
    .withSuccessHandler(function(rows) {
      _renderResourceMapEntries_(rows || []);
      if (info) info.textContent = 'Total resource map: ' + ((rows && rows.length) || 0);
    })
    .withFailureHandler(function(err) {
      if (el) el.innerHTML = '<div class="alert-banner error">❌ ' + (err.message || 'Gagal') + '</div>';
      if (info) info.textContent = '❌ Gagal memuat resource map';
    })
    .getResourceMapEntries('');
}

function _renderResourceMapEntries_(rows) {
  var el = document.getElementById('resourceMapList');
  if (!el) return;
  if (!rows.length) {
    el.innerHTML = '<div class="alert-banner info">Belum ada resource map guru.</div>';
    window._resourceMapRows = [];
    return;
  }
  window._resourceMapRows = rows;
  var html = '<div class="table-wrap"><table><thead><tr><th>Email Guru</th><th>Deployment</th><th>Tipe</th><th>Resource ID</th><th>Owner</th><th>Status</th><th>Aksi</th></tr></thead><tbody>';
  rows.forEach(function(r) {
    var active = String(r.status || '').toLowerCase() === 'active';
    html += '<tr>' +
      '<td style="font-size:12px">' + _escSA(r.email_guru) + '</td>' +
      '<td style="font-size:11px">' + _escSA(r.deployment_id) + '</td>' +
      '<td>' + _escSA(r.resource_type) + '</td>' +
      '<td style="font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis">' + _escSA(r.resource_id) + '</td>' +
      '<td style="font-size:12px">' + _escSA(r.owner_email || '-') + '</td>' +
      '<td><span style="background:' + (active ? '#dcfce7' : '#fee2e2') + ';color:' + (active ? '#166534' : '#991b1b') + ';padding:2px 10px;border-radius:999px;font-size:12px">' + _escSA(r.status) + '</span></td>' +
      '<td style="white-space:nowrap">' +
        '<button onclick="editResourceMap(\'' + _escSA(r.id) + '\')" style="background:#dbeafe;color:#1e40af;border:none;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;margin-right:4px">✏️</button>' +
        '<button onclick="deleteResourceMapUI(\'' + _escSA(r.id) + '\')" style="background:#fee2e2;color:#991b1b;border:none;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer">🗑</button>' +
      '</td>' +
      '</tr>';
  });
  html += '</tbody></table></div>';
  el.innerHTML = html;
}

function openResourceMapModal(row) {
  var m = document.getElementById('resourceMapModal');
  if (!m) return;
  m.style.display = 'flex';
  ['rmId','rmEmail','rmResourceId','rmResourceName','rmOwnerEmail','rmCatatan'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
  var depEl = document.getElementById('rmDeployment');
  var typeEl = document.getElementById('rmType');
  var statusEl = document.getElementById('rmStatus');
  if (typeEl) typeEl.value = 'data_spreadsheet';
  if (statusEl) statusEl.value = 'active';

  google.script.run
    .withSuccessHandler(function(rows) {
      if (depEl) {
        depEl.innerHTML = (rows || []).map(function(d) {
          return '<option value="' + _escSA(d.id) + '">' + _escSA(d.nama_sekolah || d.id) + ' [' + _escSA(d.id) + ']</option>';
        }).join('');
      }
      if (row) {
        var idEl = document.getElementById('rmId'); if (idEl) idEl.value = row.id || '';
        if (depEl) depEl.value = row.deployment_id || '';
        var emailEl = document.getElementById('rmEmail'); if (emailEl) emailEl.value = row.email_guru || '';
        if (typeEl) typeEl.value = row.resource_type || 'data_spreadsheet';
        var ridEl = document.getElementById('rmResourceId'); if (ridEl) ridEl.value = row.resource_id || '';
        var rnmEl = document.getElementById('rmResourceName'); if (rnmEl) rnmEl.value = row.resource_name || '';
        var ownEl = document.getElementById('rmOwnerEmail'); if (ownEl) ownEl.value = row.owner_email || '';
        if (statusEl) statusEl.value = row.status || 'active';
        var catEl = document.getElementById('rmCatatan'); if (catEl) catEl.value = row.catatan || '';
      }
    })
    .getDeployments();
}

function editResourceMap(id) {
  var row = (window._resourceMapRows || []).find(function(r) { return r.id === id; });
  openResourceMapModal(row || null);
}

function closeResourceMapModal() {
  var m = document.getElementById('resourceMapModal');
  if (m) m.style.display = 'none';
}

function submitResourceMap() {
  var btn = document.getElementById('rmSubmitBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Menyimpan...'; }
  var payload = {
    id: (document.getElementById('rmId') || {}).value || '',
    deployment_id: (document.getElementById('rmDeployment') || {}).value || '',
    email_guru: (document.getElementById('rmEmail') || {}).value || '',
    resource_type: (document.getElementById('rmType') || {}).value || 'data_spreadsheet',
    resource_id: (document.getElementById('rmResourceId') || {}).value || '',
    resource_name: (document.getElementById('rmResourceName') || {}).value || '',
    owner_email: (document.getElementById('rmOwnerEmail') || {}).value || '',
    status: (document.getElementById('rmStatus') || {}).value || 'active',
    catatan: (document.getElementById('rmCatatan') || {}).value || ''
  };
  google.script.run
    .withSuccessHandler(function() {
      if (typeof showToast === 'function') showToast('✅ Resource map disimpan', 'success');
      if (btn) { btn.disabled = false; btn.textContent = '💾 Simpan'; }
      closeResourceMapModal();
      loadResourceMapEntries();
      loadCentralRegistryOverview();
    })
    .withFailureHandler(function(err) {
      if (typeof showToast === 'function') showToast('❌ ' + (err.message || 'Gagal'), 'error');
      if (btn) { btn.disabled = false; btn.textContent = '💾 Simpan'; }
    })
    .saveResourceMapEntry(payload);
}

function deleteResourceMapUI(id) {
  if (!confirm('Hapus resource map ini?')) return;
  google.script.run
    .withSuccessHandler(function() {
      if (typeof showToast === 'function') showToast('✅ Resource map dihapus', 'success');
      loadResourceMapEntries();
      loadCentralRegistryOverview();
    })
    .withFailureHandler(function(err) {
      if (typeof showToast === 'function') showToast('❌ ' + (err.message || 'Gagal'), 'error');
    })
    .deleteResourceMapEntry(id);
}

function loadCentralSummarySync() {
  var el = document.getElementById('centralSummarySyncBox');
  if (!el) return;
  el.innerHTML = '<div class="skeleton" style="height:80px;border-radius:10px;margin-bottom:8px"></div><div class="skeleton" style="height:80px;border-radius:10px"></div>';

  google.script.run
    .withSuccessHandler(function(rows) {
      if (!rows || rows.length === 0) {
        el.innerHTML = '<div class="alert-banner info">Belum ada summary sync guru.</div>';
        return;
      }
      var html = '<div class="table-wrap"><table><thead><tr><th>Guru</th><th>Sekolah</th><th>Jurnal</th><th>Kelas</th><th>Siswa</th><th>Rata Hadir</th><th>Kelas Favorit</th><th>Ketuntasan</th><th>Lisensi</th><th>Last Sync</th></tr></thead><tbody>';
      rows.forEach(function(r) {
        html += '<tr>' +
          '<td><b>' + _escSA(r.nama_guru || '-') + '</b><br><span style="font-size:11px;color:#6b7280">' + _escSA(r.email_guru || '-') + '</span></td>' +
          '<td style="font-size:12px">' + _escSA(r.sekolah || '-') + '<br><span style="font-size:11px;color:#6b7280">' + _escSA((r.tahun_pelajaran || '-') + ' | ' + (r.semester || '-')) + '</span></td>' +
          '<td style="text-align:center">' + r.total_jurnal + '</td>' +
          '<td style="text-align:center">' + r.total_kelas + '</td>' +
          '<td style="text-align:center">' + r.total_siswa + '</td>' +
          '<td style="text-align:center">' + r.rata_hadir + '%</td>' +
          '<td style="font-size:12px">' + _escSA(r.kelas_favorit || '-') + '</td>' +
          '<td style="font-size:12px">' + _escSA(r.ketuntasan_terbaik || '-') + '</td>' +
          '<td><span class="badge">' + _escSA(r.license_status || '-') + '</span></td>' +
          '<td style="font-size:11px">' + _escSA(r.last_sync || '-') + '</td>' +
          '</tr>';
      });
      html += '</tbody></table></div>';
      el.innerHTML = html;
    })
    .withFailureHandler(function(err) {
      el.innerHTML = '<div class="alert-banner error">❌ ' + (err.message || 'Gagal memuat summary sync') + '</div>';
    })
    .getCentralSummarySyncRows();
}

function loadUpdatePipeline() {
  loadAppReleases();
  loadUpdateLogRows();
}

function loadAppReleases() {
  var el = document.getElementById('appReleaseBox');
  if (!el) return;
  el.innerHTML = '<div class="skeleton" style="height:70px;border-radius:10px"></div>';

  google.script.run
    .withSuccessHandler(function(rows) {
      window._appReleaseRows = rows || [];
      if (!rows || !rows.length) {
        el.innerHTML = '<div class="alert-banner info">Belum ada release tercatat.</div>';
        return;
      }
      var html = '<div style="font-size:12px;font-weight:700;color:#6d28d9;margin-bottom:6px">DAFTAR RELEASE</div>' +
        '<div class="table-wrap"><table><thead><tr><th>Versi</th><th>Schema</th><th>Channel</th><th>Status</th><th>Migrasi</th><th>Dibuat</th><th>Aksi</th></tr></thead><tbody>';
      rows.forEach(function(r) {
        var statusBg = r.status === 'published' ? '#dcfce7' : (r.status === 'deprecated' ? '#fee2e2' : '#fef3c7');
        var statusFg = r.status === 'published' ? '#166534' : (r.status === 'deprecated' ? '#991b1b' : '#92400e');
        html += '<tr>' +
          '<td><b>' + _escSA(r.version) + '</b></td>' +
          '<td>' + _escSA(r.schema_version) + '</td>' +
          '<td>' + _escSA(r.channel) + '</td>' +
          '<td><span style="background:' + statusBg + ';color:' + statusFg + ';padding:2px 10px;border-radius:999px;font-size:12px">' + _escSA(r.status) + '</span></td>' +
          '<td style="text-align:center">' + (String(r.allow_migration) === 'true' ? '✅' : '⛔') + '</td>' +
          '<td style="font-size:11px">' + _escSA(r.created_at || '-') + '<br><span class="muted">' + _escSA(r.created_by || '-') + '</span></td>' +
          '<td><button onclick="editAppRelease(\'' + _escSA(r.id) + '\')" style="background:#ede9fe;color:#5b21b6;border:none;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer">✏️</button></td>' +
          '</tr>';
      });
      html += '</tbody></table></div>';
      el.innerHTML = html;
    })
    .withFailureHandler(function(err) {
      el.innerHTML = '<div class="alert-banner error">❌ ' + (err.message || 'Gagal memuat release') + '</div>';
    })
    .getAppReleases();
}

function openAppReleaseModal(row) {
  var m = document.getElementById('appReleaseModal');
  if (!m) return;
  m.style.display = 'flex';
  var fields = { relId: '', relVersion: '', relSchema: '', relManifest: '', relCatatan: '' };
  Object.keys(fields).forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = fields[id];
  });
  var chEl = document.getElementById('relChannel');
  var stEl = document.getElementById('relStatus');
  var miEl = document.getElementById('relMigration');
  if (chEl) chEl.value = 'stable';
  if (stEl) stEl.value = 'draft';
  if (miEl) miEl.value = 'true';

  if (row) {
    var idEl = document.getElementById('relId'); if (idEl) idEl.value = row.id || '';
    var vEl = document.getElementById('relVersion'); if (vEl) vEl.value = row.version || '';
    var sEl = document.getElementById('relSchema'); if (sEl) sEl.value = row.schema_version || '';
    if (chEl) chEl.value = row.channel || 'stable';
    if (stEl) stEl.value = row.status || 'draft';
    if (miEl) miEl.value = String(row.allow_migration) === 'false' ? 'false' : 'true';
    var mEl = document.getElementById('relManifest'); if (mEl) mEl.value = row.manifest_json || '';
    var cEl = document.getElementById('relCatatan'); if (cEl) cEl.value = row.catatan || '';
  }
}

function editAppRelease(id) {
  var row = (window._appReleaseRows || []).find(function(r) { return r.id === id; });
  openAppReleaseModal(row || null);
}

function closeAppReleaseModal() {
  var m = document.getElementById('appReleaseModal');
  if (m) m.style.display = 'none';
}

function submitAppRelease() {
  var version = ((document.getElementById('relVersion') || {}).value || '').trim();
  var schema = ((document.getElementById('relSchema') || {}).value || '').trim();
  if (!version || !schema) {
    if (typeof showToast === 'function') showToast('❌ Versi & schema wajib diisi', 'error');
    return;
  }
  var btn = document.getElementById('relSubmitBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Menyimpan...'; }
  var payload = {
    id: (document.getElementById('relId') || {}).value || '',
    version: version,
    schema_version: schema,
    channel: (document.getElementById('relChannel') || {}).value || 'stable',
    status: (document.getElementById('relStatus') || {}).value || 'draft',
    allow_migration: (document.getElementById('relMigration') || {}).value !== 'false',
    manifest_json: (document.getElementById('relManifest') || {}).value || '',
    catatan: (document.getElementById('relCatatan') || {}).value || ''
  };
  google.script.run
    .withSuccessHandler(function() {
      if (typeof showToast === 'function') showToast('✅ Release disimpan', 'success');
      if (btn) { btn.disabled = false; btn.textContent = '💾 Simpan'; }
      closeAppReleaseModal();
      loadAppReleases();
      loadCentralRegistryOverview();
    })
    .withFailureHandler(function(err) {
      if (typeof showToast === 'function') showToast('❌ ' + (err.message || 'Gagal'), 'error');
      if (btn) { btn.disabled = false; btn.textContent = '💾 Simpan'; }
    })
    .saveAppRelease(payload);
}

function loadUpdateLogRows() {
  var el = document.getElementById('updateLogBox');
  if (!el) return;
  el.innerHTML = '<div class="skeleton" style="height:70px;border-radius:10px"></div>';

  google.script.run
    .withSuccessHandler(function(rows) {
      if (!rows || !rows.length) {
        el.innerHTML = '<div class="alert-banner info">Belum ada histori update/approval.</div>';
        return;
      }
      var html = '<div style="font-size:12px;font-weight:700;color:#1d4ed8;margin-bottom:6px">UPDATE LOG & APPROVAL</div>' +
        '<div class="table-wrap"><table><thead><tr><th>Deployment</th><th>Target</th><th>Versi</th><th>Status</th><th>Approved By</th><th>Waktu</th><th>Aksi</th></tr></thead><tbody>';
      rows.forEach(function(r) {
        var badgeMap = { approved: ['#dbeafe','#1e40af'], notified: ['#fef3c7','#92400e'], applied: ['#dcfce7','#166534'], failed: ['#fee2e2','#991b1b'], rejected: ['#fee2e2','#991b1b'] };
        var colors = badgeMap[r.status] || ['#f3f4f6','#374151'];
        html += '<tr>' +
          '<td style="font-size:11px">' + _escSA(r.deployment_id) + '</td>' +
          '<td style="font-size:12px">' + _escSA(r.target_email || '-') + '</td>' +
          '<td style="font-size:12px">' + _escSA(r.from_version || '-') + ' → ' + _escSA(r.to_version || '-') + '</td>' +
          '<td><span style="background:' + colors[0] + ';color:' + colors[1] + ';padding:2px 10px;border-radius:999px;font-size:12px">' + _escSA(r.status) + '</span></td>' +
          '<td style="font-size:11px">' + _escSA(r.approved_by || '-') + '</td>' +
          '<td style="font-size:11px">' + _escSA(r.executed_at || '-') + '</td>' +
          '<td style="white-space:nowrap">' + _renderUpdateLogActions_(r) + '</td>' +
          '</tr>';
      });
      html += '</tbody></table></div>';
      el.innerHTML = html;
    })
    .withFailureHandler(function(err) {
      el.innerHTML = '<div class="alert-banner error">❌ ' + (err.message || 'Gagal memuat update log') + '</div>';
    })
    .getUpdateLogRows('');
}

function _updateLogActionBtn_(id, status, label, bg, fg) {
  return '<button onclick="setUpdateLogStatusUI(\'' + _escSA(id) + '\',\'' + status + '\')" style="background:' + bg + ';color:' + fg + ';border:none;border-radius:8px;padding:4px 8px;font-size:11px;cursor:pointer;margin-right:4px">' + label + '</button>';
}

function _renderUpdateLogActions_(r) {
  if (r.status === 'approved') {
    return _updateLogActionBtn_(r.id, 'notified', '➡ Notified', '#dbeafe', '#1e40af') +
      _updateLogActionBtn_(r.id, 'rejected', '✖ Reject', '#fee2e2', '#991b1b');
  }
  if (r.status === 'notified') {
    return _updateLogActionBtn_(r.id, 'applied', '✅ Applied', '#dcfce7', '#166534') +

function loadAcademicGlobalPanel() {

  const body = document.getElementById('saGuruPeriodBody');

    .withSuccessHandler(function(res) {

        .filter(function(v, i, arr){ return v && arr.indexOf(v) === i; })
        .sort();

        tahunSel.innerHTML = years.map(function(y){

function filterGuruPeriodTable_() {
  const q = String((document.getElementById('saGuruPeriodFilter') || {}).value || '').toLowerCase().trim();
  if (!q) return renderGuruPeriodTable_(_saGuruPeriodRows);
  const filtered = (_saGuruPeriodRows || []).filter(function(r) {
    const hay = [r.nama_guru, r.email, r.role, r.status, r.tahun_pelajaran_aktif, r.semester_aktif]
      .join(' ')
      .toLowerCase();
    return hay.indexOf(q) !== -1;
  });
  renderGuruPeriodTable_(filtered);
}

/*************************************************
 * LICENSE BADGE (FINAL – STABLE)
 *************************************************/
function renderLicenseBadge(u){
  if(!u || !u.licenseKey || u.sisaHari === null || u.sisaHari === undefined){
    return '<span class="badge">-</span>';
  }

  const sisa = Number(u.sisaHari);
  let bg   = '#22c55e';
  let text = `Aktif (${sisa} hari)`;

  if(sisa <= 60){
    bg = '#facc15';
    text = `⚠️ ${sisa} hari`;
  }
  if(sisa <= 30){
    bg = '#ef4444';
    text = `⛔ ${sisa} hari`;
  }
  if(sisa <= 0){
    bg = '#6b7280';
    text = `Expired`;
  }

  return `
    <span style="
      background:${bg};
      color:#fff;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      display:inline-block;
      box-shadow:0 6px 14px rgba(0,0,0,.25)
    ">
      ${text}
    </span>
  `;
}

/*************************************************
 * MASA AKTIF BADGE
 *************************************************/
function renderMasaAktif_(u) {
  // sisaHari === null → lifetime (expired kosong)
  if (u.sisaHari === null || u.sisaHari === undefined) {
    return '<span style="background:#6366f1;color:#fff;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;display:inline-block">♾️ Lifetime</span>';
  }
  var sisa = Number(u.sisaHari);
  var exp  = u.expired && u.expired !== '-' ? u.expired : '-';
  var bg, label;
  if (sisa > 60) {
    bg = '#22c55e'; label = '✅ ' + sisa + ' hari';
  } else if (sisa > 30) {
    bg = '#f59e0b'; label = '⚠️ ' + sisa + ' hari';
  } else if (sisa > 0) {
    bg = '#ef4444'; label = '🔴 ' + sisa + ' hari';
  } else {
    bg = '#6b7280'; label = '⛔ Expired';
  }
  return '<span style="background:' + bg + ';color:#fff;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;display:inline-block" title="s.d. ' + exp + '">' + label + '</span><br><span style="font-size:10px;color:#6b7280">' + exp + '</span>';
}

/*************************************************
 * USER ACTIONS (FINAL – EXPIRED SAFE)
 *************************************************/
function renderUserActions(u){
  const expired = (u.sisaHari !== null && Number(u.sisaHari) <= 0);
  let btn = '';

  if(expired){
    return `
      <span class="badge" style="background:#9ca3af;color:#fff">
        🔒 Expired
      </span>
    `;
  }

  // Toggle status
  if(u.status === 'active'){
    btn += `<button class="ghost" onclick="setUserStatus('${u.email}','inactive')">🚫 Nonaktif</button>`;
  }else{
    btn += `<button onclick="setUserStatus('${u.email}','active')">✅ Aktifkan</button>`;
  }

  // Toggle role — now includes kepsek
  if(u.role === 'admin'){
    btn += `<button class="ghost" onclick="setUserRole('${u.email}','kepsek')">🏫 Jadikan Kepsek</button>`;
    btn += `<button class="ghost" onclick="setUserRole('${u.email}','superadmin')">👑 Jadikan SA</button>`;
  }else if(u.role === 'kepsek'){
    btn += `<button class="ghost" onclick="setUserRole('${u.email}','admin')">👨‍🏫 Jadikan Guru</button>`;
    btn += `<button class="ghost" onclick="setUserRole('${u.email}','superadmin')">👑 Jadikan SA</button>`;
  }else{
    btn += `<button class="ghost" onclick="setUserRole('${u.email}','admin')">⬇️ Turunkan</button>`;
  }

  // Delete
  btn += `<button class="danger" onclick="deleteUserUI('${u.email}')">🗑️</button>`;
  // Atur masa aktif (SA can extend/set expiry for any non-SA user)
  btn += `<button class="ghost" onclick="openSetMasaAktifModal_('${u.email}')" style="background:#f0fdf4;color:#16a34a;font-size:12px">📅 Masa Aktif</button>`;

  return btn;
}

    .withSuccessHandler(function(data){
      var totalMb = parseFloat(data.total_mb) || 0;
      if(totalEl) totalEl.textContent = totalMb.toFixed(2) + ' MB';

      // Storage warning
      google.script.run
        .withSuccessHandler(function(cfg){
          var threshold = cfg.warnMb || 500;
          var warnUsedEl = document.getElementById('arsipWarnUsed');
          var warnThEl   = document.getElementById('arsipWarnThreshold');
          if(warnEl){
            if(totalMb > threshold){
              if(warnUsedEl) warnUsedEl.textContent = totalMb.toFixed(2);
              if(warnThEl)   warnThEl.textContent   = threshold;
              warnEl.style.display = 'block';
            } else {
              warnEl.style.display = 'none';
            }
          }
        })
        .withFailureHandler(function(){})
        .getArsipFolderConfig();

      if(!data.entries || data.entries.length === 0){
        if(box) box.innerHTML = '<p class="muted">📭 Belum ada arsip dari guru manapun.</p>';
        return;
      }

      // Sort by size_mb descending
      var entries = data.entries.slice().sort(function(a, b){
        return parseFloat(b.size_mb||0) - parseFloat(a.size_mb||0);
      });
      var maxMb = parseFloat(entries[0].size_mb || 1) || 1;

      // Summary bar visualization
      var summaryHtml = '<div style="margin-bottom:18px;border:1px solid #e5e7eb;border-radius:10px;padding:12px">' +
        '<b style="font-size:13px;display:block;margin-bottom:10px">📊 Kapasitas per Guru</b>';
      entries.forEach(function(guru){
        var pct = Math.max(2, (parseFloat(guru.size_mb||0) / maxMb * 100)).toFixed(1);
        var color = pct > 75 ? '#ef4444' : pct > 40 ? '#f59e0b' : '#6366f1';
        summaryHtml += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px">' +
          '<span style="min-width:180px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + _escSA(guru.guru) + '">' + _escSA(guru.guru) + '</span>' +
          '<div style="flex:1;background:#f3f4f6;border-radius:8px;height:12px;overflow:hidden">' +
            '<div style="width:' + pct + '%;background:' + color + ';height:12px;border-radius:8px;transition:width .4s"></div>' +
          '</div>' +
          '<span style="min-width:55px;text-align:right;color:#374151;font-weight:600">' + parseFloat(guru.size_mb||0).toFixed(2) + ' MB</span>' +
          '</div>';
      });
      summaryHtml += '</div>';

      var html = summaryHtml;
      entries.forEach(function(guru){
        html += '<div style="margin-bottom:16px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
            '<b style="font-size:13px">👤 ' + _escSA(guru.guru) + '</b>' +
            '<span class="badge" style="background:#e0e7ff;color:#3730a3">' + guru.size_mb + ' MB · ' + (guru.files ? guru.files.length : 0) + ' file</span>' +
          '</div>';
        if(!guru.files || guru.files.length === 0){
          html += '<p class="muted" style="font-size:12px;margin:0">Tidak ada file</p>';
        } else {
          html += '<div class="table-wrap"><table><thead><tr>' +
            '<th>No</th><th>Tahun</th><th>File</th><th>Ukuran</th><th>Aksi</th>' +
            '</tr></thead><tbody>';
          guru.files.forEach(function(f, i){
            html += '<tr>' +
              '<td>' + (i+1) + '</td>' +
              '<td>' + _escSA(f.tahun) + '</td>' +
              '<td class="left" style="font-size:12px">' + _escSA(f.nama) + '</td>' +
              '<td>' + f.size_mb + ' MB</td>' +
              '<td style="white-space:nowrap">' +
                '<button onclick="window.open(\'' + f.url + '\',\'_blank\')" style="font-size:11px;padding:3px 8px;margin:1px">📥</button>' +
                '<button onclick="_openForwardArsip_(\'' + f.id + '\',\'' + _escSA(f.nama).replace(/'/g,'&#39;') + '\')" style="font-size:11px;padding:3px 8px;margin:1px;background:#e0e7ff;color:#3730a3;border:none;border-radius:6px;cursor:pointer">📧</button>' +
                '<button onclick="_confirmDeleteArsip_(\'' + f.id + '\',\'' + _escSA(f.nama).replace(/'/g,'&#39;') + '\')" style="font-size:11px;padding:3px 8px;margin:1px;background:#fee2e2;color:#991b1b;border:none;border-radius:6px;cursor:pointer">🗑️</button>' +
              '</td>' +
            '</tr>';
          });
          html += '</tbody></table></div>';
        }
        html += '</div>';
      });
      if(box) box.innerHTML = html;
    })
    .getArsipDriveUsage();
}

function loadArsipFolderConfig(){
  google.script.run
    .withSuccessHandler(function(cfg){
      var info = document.getElementById('arsipFolderInfo');
      if(!info) return;
      if(cfg.folderId){
        var link = cfg.folderUrl
          ? '<a href="' + cfg.folderUrl + '" target="_blank" style="color:#4338ca">' + _escSA(cfg.folderName) + '</a>'
          : _escSA(cfg.folderName);
        info.innerHTML = '📁 Folder aktif: ' + link + ' <span class="muted" style="font-size:11px">(' + cfg.folderId + ')</span>';
      } else {
        info.innerHTML = '📁 Menggunakan folder default: <b>JURNAL_ARSIP</b> di My Drive';
      }
      var warnInput = document.getElementById('arsipWarnMbInput');
      if(warnInput && cfg.warnMb) warnInput.value = cfg.warnMb;
    })
    .withFailureHandler(function(err){
      var info = document.getElementById('arsipFolderInfo');
      if(info) info.innerHTML = '<span class="muted">❌ ' + _escSA(err.message) + '</span>';
    })
    .getArsipFolderConfig();
}

function saveArsipFolderConfig(){
  var input  = (document.getElementById('arsipFolderInput') || {}).value || '';
  var warnMb = (document.getElementById('arsipWarnMbInput') || {}).value || '';
  google.script.run
    .withSuccessHandler(function(res){
      if(typeof showToast==='function'){

function loadSchoolLicenseUI() {
  var el = document.getElementById('schoolLicenseInfo');
  if (!el) return;
  el.innerHTML = '<p class="muted">⏳ Memuat...</p>';

  // Load tier badge too
  google.script.run
    .withSuccessHandler(function(info) {
      var badge = document.getElementById('currentTierBadge');
      if (badge && info) {
        var colors = { LITE: '#f3f4f6:#374151', PRO: '#eff6ff:#6366f1', SCHOOL: '#f0fdf4:#16a34a' };
        var parts  = (colors[info.tier] || '#f3f4f6:#374151').split(':');
        badge.style.background = parts[0];
        badge.style.color      = parts[1];
        badge.textContent = '⚡ ' + (info.tier || 'LITE');
      }
    })
    .withFailureHandler(function() {})
    .getSchoolTierInfo();

  google.script.run
    .withFailureHandler(function(err) {
      el.innerHTML = '<span style="color:#dc2626">❌ ' + err.message + '</span>';
    })
    .withSuccessHandler(function(lic) {
      var statusColor = lic.isActive ? '#166534' : '#991b1b';
      var statusBg    = lic.isActive ? '#dcfce7' : '#fee2e2';
      var statusLabel = lic.isLifetime ? '♾️ Lifetime' : (lic.isActive ? '✅ Aktif' : '❌ Tidak Aktif');
      var daysStr     = '';
      if (lic.expires) {
        daysStr = lic.isActive
          ? ' · <b>' + lic.daysLeft + '</b> hari tersisa'
          : ' · Sudah expired ' + Math.abs(lic.daysLeft) + ' hari lalu';
      }
      el.innerHTML =
        '<div style="display:flex;flex-wrap:wrap;gap:16px;align-items:center">' +
        '<span style="background:' + statusBg + ';color:' + statusColor + ';padding:4px 14px;border-radius:999px;font-size:13px;font-weight:700">' + statusLabel + '</span>' +
        (lic.key ? '<span style="font-family:monospace;font-size:13px;background:#f3f4f6;padding:4px 10px;border-radius:8px">🔑 ' + lic.key + '</span>' : '') +
        (lic.expires ? '<span style="font-size:13px">📅 s.d. <b>' + lic.expires + '</b>' + daysStr + '</span>' : '<span class="muted">Lisensi aktif seumur hidup</span>') +
        '</div>';
    })
    .getSchoolLicense();
}

   DEPLOYMENT TRACKER — Vendor untuk kelola multi-deployment
   ===================================================================== */
function loadDeployments() {
  var el = document.getElementById('deploymentList');
  if (!el) return;
  el.innerHTML = '<div class="skeleton" style="height:80px;border-radius:10px;margin-bottom:6px"></div>'.repeat(3);

  google.script.run
    .withSuccessHandler(function(rows) {
      _renderDeployments_(rows, el);
    })
    .withFailureHandler(function(err) {
      el.innerHTML = '<div class="alert-banner error">❌ ' + (err.message || 'Gagal') + '</div>';
    })
    .getDeployments();
}

function _renderDeployments_(rows, el) {
  if (!rows || rows.length === 0) {
    el.innerHTML = '<div class="alert-banner info">Belum ada deployment tercatat.</div>';
    return;
  }
  var statusColors = { aktif: { bg:'#dcfce7', color:'#166534' }, nonaktif: { bg:'#fee2e2', color:'#991b1b' }, trial: { bg:'#fef9c3', color:'#854d0e' } };
  var html = '<div class="table-wrap"><table><thead><tr><th>Sekolah</th><th>Email SA</th><th>Script ID</th><th>Tanggal</th><th>Status</th><th>Catatan</th><th>Aksi</th></tr></thead><tbody>';
  rows.forEach(function(d) {
    var sc = statusColors[d.status] || { bg:'#f3f4f6', color:'#374151' };
    html += '<tr>' +
      '<td><b>' + _escSA(d.nama_sekolah) + '</b></td>' +
      '<td style="font-size:12px">' + _escSA(d.email_sa) + '</td>' +
      '<td style="font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis">' + _escSA(d.script_id || '-') + '</td>' +
      '<td style="font-size:12px">' + _escSA(d.tanggal) + '</td>' +
      '<td><span style="background:' + sc.bg + ';color:' + sc.color + ';padding:2px 10px;border-radius:999px;font-size:12px">' + _escSA(d.status) + '</span></td>' +
      '<td style="font-size:12px;max-width:200px">' + _escSA(d.catatan || '-') + '</td>' +
      '<td style="white-space:nowrap">' +
        '<button onclick="editDeployment(\'' + _escSA(d.id) + '\')" style="background:#dbeafe;color:#1e40af;border:none;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;margin-right:4px">✏️</button>' +
        '<button onclick="deleteDeploymentSA(\'' + _escSA(d.id) + '\')" style="background:#fee2e2;color:#991b1b;border:none;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer">🗑</button>' +
      '</td>' +
      '</tr>';
  });
  html += '</tbody></table></div>';
  // Store data for edit
  window._depRows = rows;
  el.innerHTML = html;
}

function openDeploymentModal(dep) {
  var m = document.getElementById('deploymentModal');
  if (!m) return;
  m.style.display = 'flex';

  ['depId','depNama','depEmail','depScript','depStatus','depCatatan'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });

  if (dep) {
    var idEl = document.getElementById('depId');       if (idEl) idEl.value = dep.id || '';
    var nmEl = document.getElementById('depNama');     if (nmEl) nmEl.value = dep.nama_sekolah || '';
    var emEl = document.getElementById('depEmail');    if (emEl) emEl.value = dep.email_sa || '';
    var scEl = document.getElementById('depScript');   if (scEl) scEl.value = dep.script_id || '';
    var stEl = document.getElementById('depStatus');   if (stEl) stEl.value = dep.status || 'aktif';
    var ctEl = document.getElementById('depCatatan');  if (ctEl) ctEl.value = dep.catatan || '';
  }

  var nmEl2 = document.getElementById('depNama');
  if (nmEl2) nmEl2.focus();
}

function editDeployment(id) {
  if (!window._depRows) return;
  var dep = window._depRows.find(function(d){ return d.id === id; });
  if (dep) openDeploymentModal(dep);
}

function closeDeploymentModal() {
  var m = document.getElementById('deploymentModal');
  if (m) m.style.display = 'none';
}

function submitDeployment() {
  var id     = (document.getElementById('depId')      || {}).value || '';
  var nama   = (document.getElementById('depNama')    || {}).value || '';
  var email  = (document.getElementById('depEmail')   || {}).value || '';
  var script = (document.getElementById('depScript')  || {}).value || '';
  var status = (document.getElementById('depStatus')  || {}).value || 'aktif';
  var catat  = (document.getElementById('depCatatan') || {}).value || '';

  if (!nama.trim()) { if (typeof showToast === 'function') showToast('⚠️ Nama sekolah wajib diisi', 'warning'); return; }
  if (!email.trim()) { if (typeof showToast === 'function') showToast('⚠️ Email SA wajib diisi', 'warning'); return; }

  var btn = document.getElementById('depSubmitBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Menyimpan...'; }

  google.script.run
    .withSuccessHandler(function() {
      closeDeploymentModal();
      if (typeof showToast === 'function') showToast('✅ Deployment disimpan', 'success');
      if (btn) { btn.disabled = false; btn.textContent = '💾 Simpan'; }
      loadDeployments();
    })
    .withFailureHandler(function(err) {
      if (typeof showToast === 'function') showToast('❌ ' + (err.message || 'Gagal'), 'error');
      if (btn) { btn.disabled = false; btn.textContent = '💾 Simpan'; }
    })
    .saveDeployment({ id: id || null, nama_sekolah: nama.trim(), email_sa: email.trim(), script_id: script.trim(), status: status, catatan: catat.trim() });
}

function deleteDeploymentSA(id) {
  if (!confirm('Hapus data deployment ini?')) return;
  google.script.run
    .withSuccessHandler(function() {
      if (typeof showToast === 'function') showToast('✅ Deployment dihapus', 'success');
      loadDeployments();
    })
    .withFailureHandler(function(err) {
      if (typeof showToast === 'function') showToast('❌ ' + (err.message || 'Gagal'), 'error');
    })
    .deleteDeployment(id);
}

function exportDeploymentsExcel() {
  if (typeof XLSX === 'undefined') { if (typeof showToast === 'function') showToast('⏳ Library belum siap', 'warning'); return; }
  google.script.run
    .withSuccessHandler(function(rows) {
      var wb  = XLSX.utils.book_new();
      var dat = [['Sekolah', 'Email SA', 'Script ID', 'Tanggal', 'Status', 'Catatan']];
      (rows || []).forEach(function(r) { dat.push([r.nama_sekolah, r.email_sa, r.script_id, r.tanggal, r.status, r.catatan]); });
      var ws = XLSX.utils.aoa_to_sheet(dat);
      ws['!cols'] = [25, 30, 40, 12, 10, 30].map(function(w){ return {wch:w}; });
      XLSX.utils.book_append_sheet(wb, ws, 'Deployments');
      XLSX.writeFile(wb, 'Deployments_' + new Date().toLocaleDateString('id-ID').replace(/\//g,'-') + '.xlsx');
      if (typeof showToast === 'function') showToast('✅ Excel diunduh', 'success');
    })
    .withFailureHandler(function() {})
    .getDeployments();
}

function _escSA(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─────────────────────────────────────────────────────────────
   ATUR MASA AKTIF USER — SuperAdmin
───────────────────────────────────────────────────────────── */
var _masaAktifTargetEmail_ = '';

function openSetMasaAktifModal_(email) {
  _masaAktifTargetEmail_ = email;
  var emailEl = document.getElementById('setMasaEmail');
  if (emailEl) emailEl.textContent = email;

  // Reset radio + date
  var def = document.querySelector('input[name="masaDurasi"][value="lifetime"]');
  if (def) def.checked = true;
  var dateEl = document.getElementById('masaCustomDate');
  if (dateEl) dateEl.value = '';
  _updateMasaPreview_();

  // Attach events
  document.querySelectorAll('input[name="masaDurasi"]').forEach(function(r) {
    r.onchange = _updateMasaPreview_;
  });
  var dateEl2 = document.getElementById('masaCustomDate');
  if (dateEl2) dateEl2.oninput = _updateMasaPreview_;

  document.getElementById('setMasaAktifModal').style.display = '';
}

function _updateMasaPreview_() {
  var customDate = (document.getElementById('masaCustomDate') || {}).value || '';
  var radioEl    = document.querySelector('input[name="masaDurasi"]:checked');
  var val        = radioEl ? radioEl.value : 'lifetime';
  var preview    = document.getElementById('masaPreviewText');

  // Highlight selected radio label
  [30, 90, 180, 365, 0].forEach(function(d) {
    var lbl = document.getElementById('maDur-' + d);
    if (lbl) lbl.style.borderColor = '#e5e7eb';
  });
  var activeLbl = document.getElementById('maDur-' + val);
  if (!activeLbl) activeLbl = document.getElementById('maDur-0');
  if (activeLbl) activeLbl.style.borderColor = '#6366f1';

  if (customDate) {
    if (preview) preview.textContent = customDate + ' (manual)';
    return;
  }
  if (val === 'lifetime') {
    if (preview) preview.textContent = '♾️ Seumur Hidup';
    return;
  }
  var d = new Date();
  d.setDate(d.getDate() + parseInt(val, 10));
  if (preview) preview.textContent = d.toLocaleDateString('id-ID', {day:'2-digit',month:'long',year:'numeric'});
}

function confirmSetMasaAktif_() {
  var customDate = (document.getElementById('masaCustomDate') || {}).value || '';
  var radioEl    = document.querySelector('input[name="masaDurasi"]:checked');
  var val        = radioEl ? radioEl.value : 'lifetime';

  var expiredStr = '';
  if (customDate) {
    expiredStr = customDate; // yyyy-mm-dd
  } else if (val !== 'lifetime') {
    var d = new Date();
    d.setDate(d.getDate() + parseInt(val, 10));
    expiredStr = d.toISOString().split('T')[0];
  }
  // lifetime → expiredStr = '' (kosong)

  google.script.run
    .withSuccessHandler(function() {
      if (typeof showToast === 'function')
        showToast('✅ Masa aktif ' + _masaAktifTargetEmail_ + ' berhasil diupdate', 'success');
      document.getElementById('setMasaAktifModal').style.display = 'none';
      loadUserManagement();
    })
    .withFailureHandler(function(err) {
      if (typeof showToast === 'function')
        showToast('❌ ' + (err.message || 'Gagal'), 'error');
    })
    .setUserExpiry(_masaAktifTargetEmail_, expiredStr);
}

function genTierKey_(tierType) {
  google.script.run
    .withSuccessHandler(function(key) {
      var el = document.getElementById('generatedTierKey');
      if (el) { el.value = key; el.focus(); el.select(); }
      if (typeof showToast === 'function') showToast('🎲 ' + tierType + ' Key: ' + key + '  (klik field untuk copy)', 'info', 6000);
    })
    .withFailureHandler(function(err) {
      if (typeof showToast === 'function') showToast('❌ ' + err.message, 'error');
      else alert('❌ ' + err.message);
    })
    .generateTierLicenseKey(tierType);
}

function setTierUI_() {
  var tier = (document.getElementById('setTierSelect') || {}).value || 'LITE';
  var key  = ((document.getElementById('setTierKeyInput') || {}).value || '').trim().toUpperCase();
  if (tier !== 'LITE' && !key) {
    if (typeof showToast === 'function') showToast('⚠️ Kode lisensi wajib untuk tier ' + tier, 'warning');
    else alert('Kode lisensi wajib untuk tier ' + tier);
    return;
  }
  if (!confirm('Set tier sekolah ini ke ' + tier + '?\n' + (tier === 'LITE' ? 'Semua fitur premium akan dinonaktifkan.' : 'Fitur ' + tier + ' akan diaktifkan.'))) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (typeof showToast === 'function') showToast('✅ Tier berhasil diset ke ' + res.tier, 'success');
      loadSchoolLicenseUI();
    })
    .withFailureHandler(function(err) {
      if (typeof showToast === 'function') showToast('❌ ' + err.message, 'error');
      else alert('❌ ' + err.message);
    })
    .setSchoolTier(tier, key);
}
