  <!-- Instant dark mode — applied before CSS renders to prevent flash -->
  <script>
  (function(){
    var s = localStorage.getItem('darkMode');
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    if(s === '1' || (s === null && prefersDark)){
      document.documentElement.setAttribute('data-dark','1');
      // Apply as early as possible
      if(document.body) document.body.classList.add('dark');
      document.addEventListener('DOMContentLoaded', function(){
        document.body.classList.add('dark');
      });
    }
  })();
  </script>

}

        ]
      };
      var blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
      var url  = URL.createObjectURL(blob);
      var link = document.createElement('link');
      link.rel  = 'manifest';
      link.href = url;
      document.head.appendChild(link);
      // Sync theme-color meta with current mode
      var themeEl = document.querySelector('meta[name="theme-color"]');
      if(themeEl) themeEl.setAttribute('content', isDark ? '#312e81' : '#6C63FF');
    } catch(e) {}
  })();
