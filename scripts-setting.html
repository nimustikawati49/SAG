function simpanSetting(){

  if(!settingSudahAda){
    if(
      !set_sekolah.value.trim() ||
      !set_tahun.value.trim() ||
      !set_semester.value.trim() ||
      !set_guru.value.trim() ||
      document.querySelectorAll('.mapel-cb:checked').length === 0
    ){
      alert('⚠️ Lengkapi semua data setting terlebih dahulu');
      return;
    }
  }

  startProgress();

  uploadLogoIfAny(function(logoUrl){

    const payload = {
      sekolah          : set_sekolah.value.trim(),
      tahun_pelajaran  : set_tahun.value.trim(),
      semester         : set_semester.value.trim(),
      nama_guru        : set_guru.value.trim(),
      nip_guru         : set_nip_guru.value.trim(),
      mata_pelajaran   : [...document.querySelectorAll('.mapel-cb:checked')].map(cb=>cb.value).join(', '),
      app_logo_url     : logoUrl || ''
    };

    pendingSettingPayload = payload;

    // 🔥 COBA SIMPAN SETTING LANGSUNG
    google.script.run
      .withSuccessHandler(function(){

        endProgress();

        settingSudahAda = true;
        applyLockUI(true);
        lockSiswaUpload(true);

        pendingSettingPayload = null;

        loadSettingForm();
        checkLicenseStatus();

        alert('✅ Setting berhasil disimpan');

      })
      .withFailureHandler(function(err){

        endProgress();

        // 🔥 JIKA BUTUH LISENSI
        if(
          err.message === 'INPUT_LICENSE' ||
          err.message === 'LISENSI_EXPIRED'
        ){

          openLicenseModal(function(key){

            if(!key){
              alert('Kode lisensi wajib diisi');
              return;
            }

            startProgress();

            // 🔑 AKTIVASI LISENSI
            google.script.run
              .withSuccessHandler(function(res){

                if(!res || res.status !== true){
                  endProgress();
                  alert('❌ Kode lisensi tidak valid');
                  return;
                }

                // ✅ AKTIVASI SUKSES → SIMPAN SETTING ULANG
                google.script.run
                  .withSuccessHandler(function(){

                    endProgress();
                    closeLicenseModal();

                    settingSudahAda = true;
                    applyLockUI(true);
                    lockSiswaUpload(true);

                    pendingSettingPayload = null;

                    loadSettingForm();
                    checkLicenseStatus();

                    alert(
                      '✅ Lisensi aktif 1 tahun\n' +
                      'Berlaku sampai: ' + (res.expired || '-')
                    );

                  })
                  .withFailureHandler(function(e){
                    endProgress();
                    alert('❌ Gagal simpan setting:\n' + e.message);
                  })
                  .saveSetting(pendingSettingPayload);

              })
              .withFailureHandler(function(e){
                endProgress();
                alert('❌ Aktivasi lisensi gagal:\n' + e.message);
              })
              .activateLicense(key);

          });

          return;
        }

        alert('❌ Gagal menyimpan setting:\n' + err.message);

      })
      .saveSetting(payload);

  });
}

async function cropToSquare(base64, size = 96){
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const min = Math.min(img.width, img.height);
      const sx = (img.width - min) / 2;
      const sy = (img.height - min) / 2;
      ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
      resolve(canvas.toDataURL('image/png'));
    };
    img.src = base64;
  });
}

async function uploadLogoIfAny(callback){

  if(!logoFile.files.length){
    callback(null);
    return;
  }

  const file = logoFile.files[0];
  const reader = new FileReader();

  reader.onload = async e => {

    const croppedBase64 = await cropToSquare(e.target.result, 96);

    google.script.run
      .withSuccessHandler(url => {
        callback(url);
      })
      .withFailureHandler(err => {

        // ===============================
        // 🔑 TRIGGER INPUT LICENSE
        // ===============================
        if(
            err.message &&
            (
              err.message.includes('TRIGGER_INPUT_LICENSE') ||
              err.message.includes('LISENSI_DIBUTUHKAN') ||
              err.message.includes('LISENSI_EXPIRED')
            )
          ){

          openLicenseModal(function(key){

            startProgress();

            google.script.run
              .withSuccessHandler(function(){
                endProgress();

                // 🔁 ulang upload setelah aktivasi
                setTimeout(function(){
                  uploadLogoIfAny(callback);
                },300);

              })
              .withFailureHandler(function(e){
                endProgress();
                alert('❌ Aktivasi lisensi gagal:\n' + e.message);
                callback(null);
              })
              .activateLicense(key);

          });

          return;
        }

        // ===============================
        // ERROR LAIN
        // ===============================
        alert('Upload logo gagal:\n' + err.message);
        callback(null);

      })
      .uploadLogoSekolah({
        data: croppedBase64,
        type: 'image/png',
        name: 'logo.png'
      });
  };

  reader.readAsDataURL(file);
}

function fileToBase64(file){
  return new Promise(function(resolve){
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        // Kompres: max 1280px lebar, 72% quality JPEG
        const MAX_W = 1280, QUALITY = 0.72;
        let w = img.width, h = img.height;
        if(w > MAX_W){ h = Math.round(h * MAX_W / w); w = MAX_W; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', QUALITY);
        resolve({
          name: file.name.replace(/\.[^.]+$/, '.jpg'),
          type: 'image/jpeg',
          data: compressed
        });
      };
      img.onerror = function(){
        // Fallback ke data asli jika canvas gagal (misal SVG)
        resolve({ name: file.name, type: file.type, data: e.target.result });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function loadSettingForm(){

  google.script.run.withSuccessHandler(function(d){

    if(!d) return;

    // ===============================
    // FIX: mapping sesuai ID HTML
    // ===============================

    set_sekolah.value     = d.sekolah || '';
    set_tahun.value       = d.tahun_pelajaran || '';
    set_semester.value    = d.semester || '';
    set_guru.value        = d.nama_guru || '';
    set_nip_guru.value    = d.nip_guru || '';

    document.querySelectorAll('.mapel-cb').forEach(cb=>{
      cb.checked = savedMapels.some(m=>m.toLowerCase()===cb.value.toLowerCase());
    });

    if(d.app_logo_url){
      img.src = d.app_logo_url;   // ⬅️ HAPUS cache buster
      img.style.display = 'block';

      logoPreview.src = d.app_logo_url;
      logoPreview.style.display = 'inline-block';
    }else{
      img.removeAttribute('src');
      img.style.display = 'none';
      logoPreview.style.display = 'none';
    }

    // ===============================
    // LOCK STATUS
    // ===============================
    if(d.lock_status === 'LOCKED'){
      applyLockUI(true);
      document.getElementById('btnEditSetting').style.display = 'inline-block';
    }else{
      applyLockUI(false);
    }

    // ===============================
    // UPDATE HEADER META SPANS
    // ===============================
    _applySettingToHeader_(d);
    refreshAcademicQuickInfo();
    initDashboardAcademicFilter();

  }).getSetting();
}

/**
 * Mengisi span meta header (dipakai oleh syncSidebarProfile_)
 * dari data setting yang sudah diambil.
 */
function _applySettingToHeader_(d){
  if(!d) return;
  // Cache globally for other tabs (e.g. Input Nilai) to use immediately
  window._settingCache = d;

  var fields = {
    sekolah        : d.sekolah         || '',
    tahun_pelajaran: d.tahun_pelajaran  || '',
    semester       : d.semester        || '',
    mata_pelajaran : d.mata_pelajaran   || '',
    nama_guru      : d.nama_guru        || ''
  };

  // 1. Populate hidden meta spans (used by syncSidebarProfile_ / MutationObserver)
  var metaMap = {
    metaSekolah  : fields.sekolah,
    metaTahun    : fields.tahun_pelajaran,
    metaSemester : fields.semester,
    metaMapel    : fields.mata_pelajaran,
    metaGuru     : fields.nama_guru
  };
  Object.keys(metaMap).forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.textContent = metaMap[id];
  });

  // 2. Update sbTop elements DIRECTLY (do not rely on syncSidebarProfile_ alone)
  var sbMap = {
    sbTopSekolah : fields.sekolah,
    sbTopTahun   : fields.tahun_pelajaran,
    sbTopSemester: fields.semester,
    sbTopMapel   : fields.mata_pelajaran,
    sbTopGuru    : fields.nama_guru
  };
  Object.keys(sbMap).forEach(function(id){
    var el = document.getElementById(id);
    if(el && sbMap[id]) el.textContent = sbMap[id];
  });

  // Logo
  var img = document.getElementById('appLogo');
  if(img && d.app_logo_url){
    img.src           = d.app_logo_url;
    img.style.display = 'block';
  }

  // Sync greeting
  if(typeof updateGreeting_ === 'function') updateGreeting_();
}

/* ===== SYNC JADWAL MAPEL SELECT + PREVIEW FROM CHECKED MAPEL ===== */
function syncMapelSelects() {
  const checked = [...document.querySelectorAll('.mapel-cb:checked')].map(cb=>cb.value);

  // Update select di jadwal
  const sel = document.getElementById('jadwal_mapel');
  if (sel) {
    const cur = sel.value;
    sel.innerHTML = '<option value="">-- Pilih Mapel --</option>';
    checked.forEach(m => {
      const o = document.createElement('option');
      o.value = o.textContent = m;
      sel.appendChild(o);
    });
    if (cur && checked.includes(cur)) sel.value = cur;
  }

  // Update preview teks di bawah pill
  const preview = document.getElementById('mapelSelectedPreview');
  if (preview) {
    if (checked.length === 0) {
      preview.textContent = '';
    } else {
      preview.innerHTML = '✅ Terpilih: ' + checked.map(m =>
        `<span style="background:#ede9fe;color:#6C63FF;border-radius:6px;padding:1px 8px;margin:0 2px;font-size:11.5px">${m}</span>`
      ).join('');
    }
  }
}

function openAcademicModal(mode){
  const m = document.getElementById('academicWizardModal');
  const t = document.getElementById('academicWizardTitle');
  const b = document.getElementById('academicWizardBody');
  const a = document.getElementById('academicWizardActions');
  const p = document.getElementById('academicWizardProgress');
  if(!m || !t || !b || !a || !p) return;

  p.style.width = '25%';
  m.style.display = 'flex';

  google.script.run.withSuccessHandler(function(cfg){
    const years = (cfg && cfg.years || []).map(function(y){ return y.tahun_pelajaran; })
      .filter(function(v,i,arr){ return v && arr.indexOf(v) === i; });
    const sems = ['Ganjil','Genap'];
    const user = (cfg && cfg.user) || {};

    if(mode === 'periode'){
      t.textContent = 'Pengaturan Tahun Pelajaran';
      b.innerHTML =
        '<label>Tahun Pelajaran Aktif</label>' +
        '<input id="wizTahun" list="wizYears" value="' + (user.tahun_pelajaran || '') + '">' +
        '<datalist id="wizYears">' + years.map(function(y){ return '<option value="'+y+'">'; }).join('') + '</datalist>';
      a.innerHTML = '<button onclick="saveAcademicPeriodFromWizard()">Simpan</button>';
      p.style.width = '60%';
      return;
    }

    if(mode === 'semester'){
      t.textContent = 'Pengaturan Semester Aktif';
      b.innerHTML =
        '<label>Semester Aktif</label>' +
        '<select id="wizSemester">' + sems.map(function(s){ return '<option ' + ((user.semester||'').toLowerCase()===s.toLowerCase()?'selected':'') + '>'+s+'</option>'; }).join('') + '</select>';
      a.innerHTML = '<button onclick="saveAcademicSemesterFromWizard()">Simpan</button>';
      p.style.width = '60%';
      return;
    }

    if(mode === 'mapel'){
      t.textContent = 'Mata Pelajaran Diampu';
      b.innerHTML =
        '<label>Pisahkan dengan koma</label>' +
        '<input id="wizMapel" value="' + ((cfg.mapel_diampu || []).join(', ')) + '">';
      a.innerHTML = '<button onclick="saveGuruMengajarFromWizard()">Simpan</button>';
      p.style.width = '70%';
      return;
    }

    if(mode === 'kelas'){
      t.textContent = 'Kelas Diampu';
      b.innerHTML =
        '<label>Pisahkan dengan koma</label>' +
        '<input id="wizKelas" value="' + ((cfg.kelas_diampu || []).join(', ')) + '">';
      a.innerHTML = '<button onclick="saveGuruMengajarFromWizard()">Simpan</button>';
      p.style.width = '70%';
      return;
    }

    if(mode === 'clone'){
      t.textContent = 'Clone Tahun Pelajaran';
      b.innerHTML =
        '<label>Source Tahun</label><input id="wizCloneSource" list="wizYears" value="' + (years[0] || '') + '">' +
        '<label>Destination Tahun</label><input id="wizCloneDest" placeholder="2026/2027">';
      a.innerHTML = '<button onclick="runCloneAcademicWizard()">Clone Sekarang</button>';
      p.style.width = '80%';
      return;
    }

    if(mode === 'promosi'){
      t.textContent = 'Promosi Siswa';
      b.innerHTML =
        '<label>Tahun Lama</label><input id="wizPromFromYear" list="wizYears" value="' + (user.tahun_pelajaran || '') + '">' +
        '<label>Semester Lama</label><select id="wizPromFromSem"><option>Ganjil</option><option>Genap</option></select>' +
        '<label>Tahun Baru</label><input id="wizPromToYear" placeholder="2026/2027">' +
        '<label>Semester Baru</label><select id="wizPromToSem"><option>Ganjil</option><option>Genap</option></select>' +
        '<label>Mapping (format: VII A=VIII A; VII B=VIII B; IX A=ALUMNI)</label>' +
        '<textarea id="wizPromMap" style="min-height:88px">VII A=VIII A; VII B=VIII B; VIII A=IX A; IX A=ALUMNI</textarea>';
      a.innerHTML = '<button onclick="runPromosiWizard()">Proses Promosi</button>';
      p.style.width = '85%';
      return;
    }

    if(mode === 'alumni'){
      t.textContent = 'Info Alumni';
      b.innerHTML = '<p class="muted">Alumni tidak dihapus. Status disimpan sebagai ALUMNI pada RiwayatKelas dan tetap tampil di histori.</p>';
      a.innerHTML = '';
      p.style.width = '100%';
    }
  }).withFailureHandler(function(err){
    b.textContent = 'Gagal memuat wizard: ' + (err.message || err);
    a.innerHTML = '';
    p.style.width = '0%';
  }).getAcademicConfig();
}

/* ===================================================================
   TRANSISI JADWAL MENGAJAR SAAT GANTI TAHUN/SEMESTER
   Setelah periode aktif berubah, cek apakah periode baru sudah punya
   jadwal (kelas+mapel diampu). Kalau kosong tapi ada jadwal periode
   lain, tawarkan pilihan: Lanjutkan jadwal sebelumnya, atau Mulai Baru.
   =================================================================== */
function checkJadwalTransition_(tahun, semester){
  if(!tahun || !semester) return;
  google.script.run
    .withSuccessHandler(function(res){
      if(!res || res.hasCurrent) return; // periode ini sudah punya jadwal, tidak perlu tanya
      if(res.hasPrevious){
        openJadwalTransitionModal_(tahun, semester, res);
      } else if(typeof showToast === 'function'){
        showToast('📋 Belum ada jadwal mengajar di periode ini. Silakan isi Kelas & Mata Pelajaran Diampu.', 'info', 6000);
      }
    })
    .withFailureHandler(function(err){ console.warn('[checkJadwalTransition_]', err && err.message); })
    .checkGuruMengajarTransition(tahun, semester);
}

function openJadwalTransitionModal_(tahun, semester, info){
  const m = document.getElementById('academicWizardModal');
  const t = document.getElementById('academicWizardTitle');
  const b = document.getElementById('academicWizardBody');
  const a = document.getElementById('academicWizardActions');
  const p = document.getElementById('academicWizardProgress');
  if(!m || !t || !b || !a || !p) return;

  const kelasTxt = (info.kelas || []).join(', ') || '-';
  const mapelTxt = (info.mapel || []).join(', ') || '-';
  const prev = info.previous_period || {};

  t.textContent = 'Jadwal Mengajar Periode Baru';
  p.style.width = '90%';
  b.innerHTML =
    '<p style="margin:0 0 10px">Anda pindah ke <b>' + _escSetting_(tahun) + ' | ' + _escSetting_(semester) + '</b> dan belum punya jadwal mengajar (kelas &amp; mapel diampu) di periode ini.</p>' +
    '<p style="margin:0 0 6px">Jadwal terakhir Anda di <b>' + _escSetting_(prev.tahun_pelajaran || '-') + ' | ' + _escSetting_(prev.semester || '-') + '</b>:</p>' +
    '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;font-size:13px;margin-bottom:10px">' +
      '<b>Kelas:</b> ' + _escSetting_(kelasTxt) + '<br><b>Mapel:</b> ' + _escSetting_(mapelTxt) +
    '</div>' +
    '<p class="muted" style="font-size:12px">Pilih salah satu: lanjutkan jadwal ini ke periode baru, atau mulai baru dari kosong.</p>';
  a.innerHTML =
    '<button class="ghost" onclick="_resetJadwalTransition_()">🆕 Mulai Baru</button>' +
    '<button onclick="_continueJadwalTransition_(\'' + _escSetting_(tahun) + '\',\'' + _escSetting_(semester) + '\',\'' + _escSetting_(prev.tahun_pelajaran || '') + '\',\'' + _escSetting_(prev.semester || '') + '\')">🔁 Lanjutkan Jadwal Sebelumnya</button>';
  m.style.display = 'flex';
}

function _escSetting_(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function _continueJadwalTransition_(toTahun, toSemester, fromTahun, fromSemester){
  startProgress();
  google.script.run
    .withSuccessHandler(function(res){
      endProgress();
      closeAcademicModal();
      refreshAcademicQuickInfo();
      showAcademicToast('✅ Jadwal mengajar dilanjutkan (' + (res.copied || 0) + ' kombinasi kelas/mapel)', 'success');
    })
    .withFailureHandler(function(err){ endProgress(); showAcademicToast('Gagal melanjutkan jadwal: ' + err.message, 'error'); })
    .continueGuruMengajarToPeriod({ from_tahun: fromTahun, from_semester: fromSemester, to_tahun: toTahun, to_semester: toSemester });
}

function _resetJadwalTransition_(){
  closeAcademicModal();
  openAcademicModal('kelas'); // periode baru sudah kosong — guru langsung isi kelas diampu dari nol
}

function resetJadwalMengajarUI(){
  const tahun = (window._settingCache && window._settingCache.tahun_pelajaran) || (document.getElementById('set_tahun') || {}).value || '';
  const semester = (window._settingCache && window._settingCache.semester) || (document.getElementById('set_semester') || {}).value || '';
  if(!tahun || !semester) return showAcademicToast('Tahun/semester aktif belum diketahui', 'warning');
  if(!confirm('Reset jadwal mengajar (kelas & mata pelajaran diampu) untuk periode ' + tahun + ' | ' + semester + '?\nJurnal/absensi yang sudah tersimpan TIDAK terhapus.')) return;

  startProgress();
  google.script.run
    .withSuccessHandler(function(res){
      endProgress();
      refreshAcademicQuickInfo();
      showAcademicToast('✅ Jadwal mengajar direset (' + (res.deleted || 0) + ' baris dihapus)', 'success');
    })
    .withFailureHandler(function(err){ endProgress(); showAcademicToast('Gagal reset jadwal: ' + err.message, 'error'); })
    .resetGuruMengajarForPeriod(tahun, semester);
}

function saveGuruMengajarFromWizard(){
  const kelasRaw = (document.getElementById('wizKelas') || {}).value || '';
  const mapelRaw = (document.getElementById('wizMapel') || {}).value || '';
  const tahun = (window._settingCache && window._settingCache.tahun_pelajaran) || (document.getElementById('set_tahun') || {}).value || '';
  const semester = (window._settingCache && window._settingCache.semester) || (document.getElementById('set_semester') || {}).value || '';
  const kelas = kelasRaw.split(',').map(function(v){ return v.trim(); }).filter(Boolean);
  const mapel = mapelRaw.split(',').map(function(v){ return v.trim(); }).filter(Boolean);

  startProgress();
  google.script.run
    .withSuccessHandler(function(){
      endProgress();
      closeAcademicModal();
      refreshAcademicQuickInfo();
      showAcademicToast('Pengaturan guru mengajar tersimpan', 'success');
    })
    .withFailureHandler(function(err){ endProgress(); showAcademicToast('Gagal: ' + err.message, 'error'); })
    .saveGuruMengajarSetting({ tahun_pelajaran:tahun, semester:semester, kelas:kelas, mapel:mapel });
}

function runCloneAcademicWizard(){
  const source = (document.getElementById('wizCloneSource') || {}).value || '';
  const dest = (document.getElementById('wizCloneDest') || {}).value || '';
  if(!source.trim() || !dest.trim()) return showAcademicToast('Source dan destination wajib diisi', 'warning');
  if(!confirm('Clone akan menyalin Guru Mengajar dan pengaturan tahun. Jurnal/absensi tidak disalin. Lanjutkan?')) return;

  startProgress();
  google.script.run
    .withSuccessHandler(function(res){
      endProgress();
      closeAcademicModal();
      refreshAcademicQuickInfo();
      showAcademicToast('Clone selesai. Baris guru mengajar: ' + (res.cloned_guru_mengajar || 0), 'success');
    })
    .withFailureHandler(function(err){ endProgress(); showAcademicToast('Gagal clone: ' + err.message, 'error'); })
    .cloneAcademicYearWizard(source.trim(), dest.trim());
}

function runPromosiWizard(){
  const fromYear = (document.getElementById('wizPromFromYear') || {}).value || '';
  const fromSem = (document.getElementById('wizPromFromSem') || {}).value || '';
  const toYear = (document.getElementById('wizPromToYear') || {}).value || '';
  const toSem = (document.getElementById('wizPromToSem') || {}).value || '';
  const mapRaw = (document.getElementById('wizPromMap') || {}).value || '';

  const mapping = mapRaw.split(';').map(function(s){
    const p = s.split('=');
    return { from: (p[0]||'').trim(), to: (p[1]||'').trim() };
  }).filter(function(x){ return x.from && x.to; });

  if(!fromYear || !fromSem || !toYear || !toSem || mapping.length === 0){
    return showAcademicToast('Lengkapi semua field promosi', 'warning');
  }
  if(!confirm('Proses promosi akan menambah RiwayatKelas tanpa membuat siswa baru. Lanjutkan?')) return;

  startProgress();
  google.script.run
    .withSuccessHandler(function(res){
      endProgress();
      closeAcademicModal();
      showAcademicToast('Promosi selesai. Diproses: ' + (res.processed || 0) + ' siswa', 'success');
    })
    .withFailureHandler(function(err){ endProgress(); showAcademicToast('Gagal promosi: ' + err.message, 'error'); })
    .promoteSiswaWizard({
      from_tahun: fromYear,
      from_semester: fromSem,
      to_tahun: toYear,
      to_semester: toSem,
      mapping: mapping
    });
}

function initDashboardAcademicFilter(){
  const tahunEl = document.getElementById('dashTahunFilter');
  const semEl = document.getElementById('dashSemesterFilter');
  if(!tahunEl || !semEl) return;

  google.script.run.withSuccessHandler(function(cfg){
    const years = (cfg.years || []).map(function(y){ return y.tahun_pelajaran; })
      .filter(function(v,i,arr){ return v && arr.indexOf(v) === i; });
    const user = cfg.user || {};

    tahunEl.innerHTML = years.map(function(y){
      return '<option ' + (String(y)===String(user.tahun_pelajaran)?'selected':'') + '>' + y + '</option>';
    }).join('');
    if(!tahunEl.innerHTML) tahunEl.innerHTML = '<option>' + (user.tahun_pelajaran || '-') + '</option>';

    semEl.innerHTML = ['Ganjil','Genap'].map(function(s){
      return '<option ' + (String(s).toLowerCase()===String(user.semester||'').toLowerCase()?'selected':'') + '>' + s + '</option>';
    }).join('');

    if(!tahunEl.dataset.binded){
      tahunEl.addEventListener('change', applyDashboardAcademicFilter);
      semEl.addEventListener('change', applyDashboardAcademicFilter);
      tahunEl.dataset.binded = '1';
    }
  }).getAcademicConfig();
}

function applyDashboardAcademicFilter(){
  const tahunEl = document.getElementById('dashTahunFilter');
  const semEl = document.getElementById('dashSemesterFilter');
  if(!tahunEl || !semEl) return;

  google.script.run
    .withSuccessHandler(function(){ loadDashboardV4(); })
    .withFailureHandler(function(err){ showAcademicToast('Gagal ubah filter dashboard: ' + err.message, 'error'); })
    .setUserAcademicPeriod(tahunEl.value, semEl.value);
}
