<script>
/* ============================================================
   scripts-notif.html — Sistem Notifikasi In-App
   SA: broadcast & kelola | Guru: lihat & baca notif
   ============================================================ */

var _notifPollTimer = null;
var _notifList      = [];

/* ── Muat daftar notif untuk guru ── */
function loadNotifGuru() {
  var listEl = document.getElementById('notifGuruList');
  if (!listEl) return;
  listEl.innerHTML = '<div class="skeleton" style="height:80px;border-radius:12px;margin-bottom:8px"></div>'.repeat(3);

  google.script.run
    .withSuccessHandler(function(items) {
      _notifList = items || [];
      _renderNotifGuru_(items);
    })
    .withFailureHandler(function(err) {
      if (listEl) listEl.innerHTML = '<div class="alert-banner error">❌ ' + (err.message || 'Gagal') + '</div>';
    })
    .getNotifList();
}

function _renderNotifGuru_(items) {
  var listEl = document.getElementById('notifGuruList');
  if (!listEl) return;

  if (!items || items.length === 0) {
    listEl.innerHTML = '<div class="alert-banner info" style="margin:8px 0">📭 Belum ada notifikasi.</div>';
    return;
  }

  var html = '';
  items.forEach(function(n) {
    var bg      = n.dibaca ? '#f9fafb' : '#eff6ff';
    var border  = n.dibaca ? '#e5e7eb' : '#3b82f6';
    var dot     = n.dibaca ? '' : '<span style="display:inline-block;width:8px;height:8px;background:#3b82f6;border-radius:50%;margin-right:6px;vertical-align:middle"></span>';
    var waktu   = n.waktu ? n.waktu.replace('T', ' ').substring(0, 16) : '';
    html += '<div id="notif-' + _escN(n.id) + '" style="background:' + bg + ';border:1.5px solid ' + border + ';border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s" ' +
            'onclick="readNotif(\'' + _escN(n.id) + '\')">' +
              '<div style="font-weight:700;font-size:14px;margin-bottom:4px">' + dot + _escN(n.judul) + '</div>' +
              '<div style="font-size:13px;color:#374151;white-space:pre-wrap">' + _escN(n.pesan) + '</div>' +
              '<div style="font-size:11px;color:#9ca3af;margin-top:8px">' + waktu + '</div>' +
            '</div>';
  });
  listEl.innerHTML = html;

  // Update badge
  _updateNotifBadge_();
}

function readNotif(notifId) {
  var el = document.getElementById('notif-' + notifId);
  if (el) {
    el.style.background = '#f9fafb';
    el.style.border = '1.5px solid #e5e7eb';
    var dot = el.querySelector('span[style*="border-radius:50%"]');
    if (dot) dot.remove();
  }

  google.script.run
    .withSuccessHandler(function() {
      _updateNotifBadge_();
    })
    .withFailureHandler(function() {})
    .markNotifRead(notifId);
}

function readAllNotif() {
  google.script.run
    .withSuccessHandler(function() {
      loadNotifGuru();
      _updateNotifBadge_();
    })
    .withFailureHandler(function(err) {
      if (typeof showToast === 'function') showToast('❌ ' + (err.message || 'Gagal'), 'error');
    })
    .markAllNotifRead();
}

function _updateNotifBadge_() {
  google.script.run
    .withSuccessHandler(function(count) {
      var badge = document.getElementById('notifBadge');
      if (!badge) return;
      if (count > 0) {
        badge.textContent = count > 99 ? '99+' : String(count);
        badge.style.display = 'inline-flex';
      } else {
        badge.style.display = 'none';
      }
    })
    .withFailureHandler(function() {})
    .getUnreadNotifCount();
}

/* ── SA: Broadcast notif ── */
function openBroadcastModal() {
  var m = document.getElementById('broadcastModal');
  if (m) {
    m.style.display = 'flex';
    var jEl = document.getElementById('broadJudul');
    if (jEl) { jEl.value = ''; jEl.focus(); }
    var pEl = document.getElementById('broadPesan');
    if (pEl) pEl.value = '';
  }
}

function closeBroadcastModal() {
  var m = document.getElementById('broadcastModal');
  if (m) m.style.display = 'none';
}

function submitBroadcast() {
  var judul = (document.getElementById('broadJudul') || {}).value || '';
  var pesan = (document.getElementById('broadPesan') || {}).value || '';

  if (!judul.trim() || !pesan.trim()) {
    if (typeof showToast === 'function') showToast('⚠️ Judul dan pesan wajib diisi', 'warning');
    return;
  }

  var btn = document.getElementById('broadSubmitBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Mengirim...'; }

  google.script.run
    .withSuccessHandler(function() {
      closeBroadcastModal();
      if (typeof showToast === 'function') showToast('✅ Broadcast terkirim ke semua guru', 'success');
      if (btn) { btn.disabled = false; btn.textContent = '📢 Kirim'; }
      loadSANotifHistory();
    })
    .withFailureHandler(function(err) {
      if (typeof showToast === 'function') showToast('❌ ' + (err.message || 'Gagal'), 'error');
      if (btn) { btn.disabled = false; btn.textContent = '📢 Kirim'; }
    })
    .broadcastNotif(judul.trim(), pesan.trim());
}

/* ── SA: Riwayat notif ── */
function loadSANotifHistory() {
  var el = document.getElementById('saNotifHistory');
  if (!el) return;
  el.innerHTML = '<div class="skeleton" style="height:60px;border-radius:10px;margin-bottom:6px"></div>'.repeat(3);

  google.script.run
    .withSuccessHandler(function(items) {
      if (!items || items.length === 0) {
        el.innerHTML = '<div class="alert-banner info">📭 Belum ada notifikasi yang dikirim.</div>';
        return;
      }
      var html = '<div class="table-wrap"><table><thead><tr><th>Waktu</th><th>Judul</th><th>Pesan</th><th>Dibaca</th><th>Hapus</th></tr></thead><tbody>';
      items.forEach(function(n) {
        var waktu = n.waktu ? n.waktu.replace('T', ' ').substring(0, 16) : '-';
        html += '<tr>' +
          '<td style="font-size:12px;white-space:nowrap">' + _escN(waktu) + '</td>' +
          '<td style="font-weight:600">' + _escN(n.judul) + '</td>' +
          '<td style="font-size:12px;max-width:300px">' + _escN(n.pesan) + '</td>' +
          '<td style="text-align:center">' + (n.dibacaCount || 0) + '</td>' +
          '<td style="text-align:center"><button onclick="deleteNotifSA(\'' + _escN(n.id) + '\')" style="background:#fee2e2;color:#991b1b;border:none;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:12px">🗑</button></td>' +
          '</tr>';
      });
      html += '</tbody></table></div>';
      el.innerHTML = html;
    })
    .withFailureHandler(function(err) {
      el.innerHTML = '<div class="alert-banner error">❌ ' + (err.message || 'Gagal') + '</div>';
    })
    .getAllNotifForSA();
}

function deleteNotifSA(notifId) {
  if (!confirm('Hapus notifikasi ini?')) return;
  google.script.run
    .withSuccessHandler(function() {
      if (typeof showToast === 'function') showToast('✅ Notif dihapus', 'success');
      loadSANotifHistory();
    })
    .withFailureHandler(function(err) {
      if (typeof showToast === 'function') showToast('❌ ' + (err.message || 'Gagal'), 'error');
    })
    .deleteNotif(notifId);
}

function _escN(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Auto-poll unread count setiap 60 detik ── */
function startNotifPoll() {
  if (_notifPollTimer) clearInterval(_notifPollTimer);
  _updateNotifBadge_();
  _notifPollTimer = setInterval(_updateNotifBadge_, 60000);
}
</script>
